<header class="header-table">
  <h2>Lista de clientes cadastrados</h2>
  <br>
  <input type="text" placeholder="Filtrar clientes" (input)="onFilterChange($event)" />
  <br>
  @if (showViewAllButton) {
    <button class="header-table__button no-print" (click)="onViewAll()">
      Ver todos
    </button>
  }
</header>
